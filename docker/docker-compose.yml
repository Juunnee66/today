# 다수의 컨테이너를 다루기위해 만드는 파일 : yml
# 들여쓰기로 계층구조가 결정됨
services:
  api:
    build: ./api
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./api:/app


  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: app_db
    ports:
      - "33060:3306"
    volumes:
      - local_db:/var/lib/mysql


  worker:
    build: ./worker
    volumes:
      - ./worker:/app


volumes:
  local_db:
 